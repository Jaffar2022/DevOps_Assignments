<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>
<body>

<h2>Submit Data</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
    Name: <input type="text" name="name" required><br><br>
    Email: <input type="email" name="email" required><br><br>
    <button type="submit">Submit</button>
</form>

</body>
</html>
